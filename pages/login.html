<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso SKALA</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
    <main class="auth-page">
        <section class="auth-card">
            <div class="auth-hero">
                <img src="../assets/logo/skala-logo-transparent.png" alt="SKALA Home Services">
                <h1>Acceso privado</h1>
                <p>Ingresa como administrador, inmobiliaria o técnico aprobado.</p>
            </div>
            <form class="auth-form" id="loginForm">
                <h2>Iniciar sesión</h2>
                <div class="field">
                    <label>Correo</label>
                    <input name="email" type="email" required value="admin@skala.cl">
                </div>
                <div class="field">
                    <label>Contraseña</label>
                    <input name="password" type="password" required value="123456">
                </div>
                <button class="btn gold" type="submit">Entrar</button>
                <a class="btn" href="registro.html">Crear cuenta</a>
            </form>
        </section>
    </main>
    <script src="../js/core/storage.js"></script>
    <script src="../js/core/database.js"></script>
    <script src="../js/core/auth.js"></script>
    <script src="../js/shared/ui.js"></script>
    <script src="../js/auth/login.js"></script>
</body>
</html>
